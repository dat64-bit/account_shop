spring.application.name=account-shop
server.port=8080
spring.main.lazy-initialization=true
# Import environment variables from .env file
spring.config.import=optional:file:.env[.properties]

# ===============================
# 1. DATABASE CONNECT (SQL SERVER)
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===============================
# 2. JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
# Giữ nguyên tên cột theo chuẩn DB (tránh tự động chuyển CamelCase sang snake_case)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Dùng 'update' để Entity tự sinh table (nếu chưa có)
spring.jpa.hibernate.ddl-auto=update
# Hiển thị SQL Query ra console để dễ debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# 3. JWT SECURITY CONFIG
# ===============================
# Cung cấp giá trị mặc định để bạn dễ dàng chạy Dev mà không cần set biến môi trường
jwt.secret=${JWT_SECRET_KEY}
jwt.expiration=${JWT_EXPIRATION}

# CORS CONFIG — override bằng biến CORS_ALLOWED_ORIGINS trong .env khi deploy
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://159.223.63.176:3000,https://vinatechsmartmanufacturing.site}

sepay.webhook.token=${SEPAY_WEBHOOK_TOKEN}

# ===============================
# 5. CLOUDINARY CONFIG
# ===============================
# Sử dụng biến môi trường hoặc các giá trị mặc định làm thông số giữ chỗ (Placeholders)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Giới hạn kích thước Multipart upload (Tối đa 5MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MINIDLE:5}
