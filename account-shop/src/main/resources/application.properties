spring.application.name=account-shop
server.port=8080

# ===============================
# 1. DATABASE CONNECT (SQL SERVER)
# ===============================
spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost:1433;databaseName=shop_account_db;encrypt=true;trustServerCertificate=true;}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ===============================
# 2. JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
# Giữ nguyên tên cột theo chuẩn DB (tránh tự động chuyển CamelCase sang snake_case)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Dùng 'update' để Entity tự sinh table (nếu chưa có)
spring.jpa.hibernate.ddl-auto=update
# Hiển thị SQL Query ra console để dễ debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# 3. JWT SECURITY CONFIG
# ===============================
# Cung cấp giá trị mặc định để bạn dễ dàng chạy Dev mà không cần set biến môi trường
jwt.secret=${JWT_SECRET_KEY:account_shop_super_secret_key_change_this_in_production_env_minimum_256_bits_length}
jwt.expiration=${JWT_EXPIRATION:86400000}

sepay.webhook.token=${SEPAY_WEBHOOK_TOKEN:your_sepay_api_token_here}

# ===============================
# 5. CLOUDINARY CONFIG
# ===============================
# Sử dụng biến môi trường hoặc các giá trị mặc định làm thông số giữ chỗ (Placeholders)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your_cloud_name_here}
cloudinary.api-key=${CLOUDINARY_API_KEY:your_api_key_here}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_api_secret_here}

# Giới hạn kích thước Multipart upload (Tối đa 5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
