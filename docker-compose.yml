# docker-compose.yml — Chạy trên DigitalOcean VPS
# File này được dùng bởi CI/CD pipeline để restart containers sau khi deploy.
#
# CÁC FILE .env ĐỌC TỪ SERVER (không commit lên git):
#   ./account-shop/.env        — DB, JWT, Cloudinary, SePay
#   ./account-shop-web/.env    — NEXT_PUBLIC_API_URL

services:
  backend:
    image: ghcr.io/dat64-bit/account-shop-backend:latest
    container_name: account-shop-backend
    restart: unless-stopped
    network_mode: "host"
    env_file:
      - ./account-shop/.env

  frontend:
    image: ghcr.io/dat64-bit/account-shop-frontend:latest
    container_name: account-shop-frontend
    restart: unless-stopped
    network_mode: "host"
    env_file:
      - ./account-shop-web/.env
